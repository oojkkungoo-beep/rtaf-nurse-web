  <style>
    /* ── Search bar ── */
    .search-bar {
      display: flex;
      flex-wrap: wrap;
      gap: .6rem;
      margin-bottom: 1rem;
    }
    .search-bar input[type="text"] {
      flex: 2 1 180px;
      min-width: 120px;
      padding: .55rem .85rem;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-family: inherit;
      font-size: .93rem;
    }
    .search-bar select {
      flex: 1 1 110px;
      min-width: 90px;
      padding: .55rem .7rem;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-family: inherit;
      font-size: .93rem;
      background: #fff;
    }
    .search-bar .btn {
      flex: 0 0 auto;
      padding: .55rem 1.3rem;
      white-space: nowrap;
    }

    /* ── Result meta ── */
    .result-meta {
      font-size: .85rem;
      color: var(--text-muted);
      margin-bottom: .5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: .4rem;
    }
    .admin-badge {
      background: var(--gold);
      color: #1a1a2e;
      font-size: .75rem;
      font-weight: 700;
      padding: .2rem .6rem;
      border-radius: 20px;
      letter-spacing: .5px;
    }

    /* ── Scrollable table wrapper ── */
    .table-scroll {
      overflow-x: auto;
      overflow-y: auto;
      max-height: 62vh;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      -webkit-overflow-scrolling: touch;
    }
    .table-scroll table {
      min-width: 520px;
      border-radius: 0;
      border: none;
    }
    .table-scroll thead th {
      position: sticky;
      top: 0;
      z-index: 2;
      background: var(--navy);
      color: #fff;
      white-space: nowrap;
      padding: .65rem .9rem;
      font-size: .82rem;
    }
    .table-scroll tbody tr:nth-child(even) { background: #f8f9fc; }
    .table-scroll tbody tr:hover { background: #eef2ff; }
    .table-scroll td {
      padding: .55rem .9rem;
      font-size: .88rem;
      vertical-align: middle;
      border-bottom: 1px solid #f0f0f5;
      white-space: nowrap;
    }
    /* col widths */
    .col-no   { width: 52px; text-align: center; }
    .col-gen  { width: 60px; text-align: center; }
    .col-name { min-width: 160px; white-space: normal; }
    .col-type { width: 90px; }
    .col-stat { width: 80px; }
    .col-act  { width: 100px; text-align: center; }

    /* ── Action buttons ── */
    .btn-edit, .btn-del {
      border: none;
      border-radius: 6px;
      padding: .3rem .65rem;
      font-size: .78rem;
      cursor: pointer;
      font-family: inherit;
      transition: opacity .15s;
    }
    .btn-edit { background: #3b82f6; color: #fff; margin-right: .25rem; }
    .btn-del  { background: #ef4444; color: #fff; }
    .btn-edit:hover, .btn-del:hover { opacity: .82; }

    /* ── Edit modal ── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: #fff;
      border-radius: 14px;
      padding: 1.5rem;
      width: 100%;
      max-width: 520px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 8px 32px rgba(0,0,0,.18);
    }
    .modal-box h3 { color: var(--navy); margin-bottom: 1rem; }
    .modal-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .7rem;
    }
    .modal-grid label { font-size: .82rem; color: #555; display: block; margin-bottom: .2rem; }
    .modal-grid input, .modal-grid select, .modal-grid textarea {
      width: 100%;
      padding: .45rem .7rem;
      border: 1.5px solid #d1d5db;
      border-radius: 7px;
      font-family: inherit;
      font-size: .9rem;
      box-sizing: border-box;
    }
    .modal-grid .full { grid-column: 1 / -1; }
    .modal-actions { display: flex; gap: .6rem; justify-content: flex-end; margin-top: 1rem; }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .search-bar input[type="text"] { flex: 1 1 100%; }
      .modal-grid { grid-template-columns: 1fr; }
      .table-scroll { max-height: 55vh; }
    }
  </style>
</head>
