<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ค้นหาสมาชิก — ชศพอ.</title>
  <link rel="icon" href="images/logo.png" type="image/png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* ── Search bar ── */
    .search-bar {
      display: flex;
      flex-wrap: wrap;
      gap: .6rem;
      margin-bottom: 1rem;
    }
    .search-bar input[type="text"] {
      flex: 2 1 180px;
      min-width: 120px;
      padding: .55rem .85rem;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-family: inherit;
      font-size: .93rem;
    }
    .search-bar select {
      flex: 1 1 110px;
      min-width: 90px;
      padding: .55rem .7rem;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-family: inherit;
      font-size: .93rem;
      background: #fff;
    }
    .search-bar .btn {
      flex: 0 0 auto;
      padding: .55rem 1.3rem;
      white-space: nowrap;
    }

    /* ── Result meta ── */
    .result-meta {
      font-size: .85rem;
      color: var(--text-muted);
      margin-bottom: .5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: .4rem;
    }
    .admin-badge {
      background: var(--gold);
      color: #1a1a2e;
      font-size: .75rem;
      font-weight: 700;
      padding: .2rem .6rem;
      border-radius: 20px;
      letter-spacing: .5px;
    }

    /* ── Scrollable table wrapper ── */
    .table-scroll {
      overflow-x: auto;
      overflow-y: auto;
      max-height: 62vh;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      -webkit-overflow-scrolling: touch;
    }
    .table-scroll table {
      min-width: 520px;
      border-radius: 0;
      border: none;
    }
    .table-scroll thead th {
      position: sticky;
      top: 0;
      z-index: 2;
      background: var(--navy);
      color: #fff;
      white-space: nowrap;
      padding: .65rem .9rem;
      font-size: .82rem;
    }
    .table-scroll tbody tr:nth-child(even) { background: #f8f9fc; }
    .table-scroll tbody tr:hover { background: #eef2ff; }
    .table-scroll td {
      padding: .55rem .9rem;
      font-size: .88rem;
      vertical-align: middle;
      border-bottom: 1px solid #f0f0f5;
      white-space: nowrap;
    }
    /* col widths */
    .col-no   { width: 52px; text-align: center; }
    .col-gen  { width: 60px; text-align: center; }
    .col-name { min-width: 160px; white-space: normal; }
    .col-type { width: 90px; }
    .col-stat { width: 80px; }
    .col-act  { width: 100px; text-align: center; }

    /* ── Action buttons ── */
    .btn-edit, .btn-del {
      border: none;
      border-radius: 6px;
      padding: .3rem .65rem;
      font-size: .78rem;
      cursor: pointer;
      font-family: inherit;
      transition: opacity .15s;
    }
    .btn-edit { background: #3b82f6; color: #fff; margin-right: .25rem; }
    .btn-del  { background: #ef4444; color: #fff; }
    .btn-edit:hover, .btn-del:hover { opacity: .82; }

    /* ── Edit modal ── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: #fff;
      border-radius: 14px;
      padding: 1.5rem;
      width: 100%;
      max-width: 520px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 8px 32px rgba(0,0,0,.18);
    }
    .modal-box h3 { color: var(--navy); margin-bottom: 1rem; }
    .modal-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .7rem;
    }
    .modal-grid label { font-size: .82rem; color: #555; display: block; margin-bottom: .2rem; }
    .modal-grid input, .modal-grid select, .modal-grid textarea {
      width: 100%;
      padding: .45rem .7rem;
      border: 1.5px solid #d1d5db;
      border-radius: 7px;
      font-family: inherit;
      font-size: .9rem;
      box-sizing: border-box;
    }
    .modal-grid .full { grid-column: 1 / -1; }
    .modal-actions { display: flex; gap: .6rem; justify-content: flex-end; margin-top: 1rem; }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .search-bar input[type="text"] { flex: 1 1 100%; }
      .modal-grid { grid-template-columns: 1fr; }
      .table-scroll { max-height: 55vh; }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="navbar-brand">
    <img src="images/logo.png" alt="ชศพอ. Logo" />
    <div class="brand-text">
      <div class="title">ชศพอ.</div>
      <div class="subtitle">ชุมนุมศิษย์พยาบาลทหารอากาศ</div>
    </div>
  </a>
  <div class="nav-links">
    <a href="index.html">หน้าหลัก</a>
    <a href="members.html" class="active">ค้นหาสมาชิก</a>
    <a href="register.html">สมัครสมาชิก</a>
    <a href="admin/index.html" class="admin-btn">Admin</a>
  </div>
</nav>

<div class="hero" style="padding:1.75rem 1.5rem">
  <h1>ค้นหาสมาชิก</h1>
  <p>ตรวจสอบรายชื่อสมาชิกชุมนุมศิษย์พยาบาลทหารอากาศ</p>
</div>

<div class="section">

  <!-- Search bar -->
  <div class="search-bar">
    <input type="text" id="s-name" placeholder="ค้นหาชื่อ / นามสกุล" />
    <select id="s-gen" onchange="doSearch()"><option value="">ทุกรุ่น</option></select>
    <select id="s-type" onchange="doSearch()"><option value="">ทุกประเภท</option></select>
    <button class="btn btn-primary">ค้นหา</button>
  </div>

  <!-- Result meta -->
  <div class="result-meta">
    <span id="result-count"></span>
  </div>

  <!-- Member list -->
  <div id="member-loading" class="loading"><div class="spinner"></div></div>
  <p id="member-empty" style="display:none;color:var(--text-muted);padding:1rem;text-align:center">ไม่พบข้อมูลสมาชิก</p>
  <div id="member-scroll" style="display:none;height:800px;overflow-y:auto;overflow-x:hidden;border:1px solid #e2e8f0;border-radius:12px;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,0.06)">
    <!-- header row -->
    <div style="display:grid;grid-template-columns:48px 56px 1fr 80px 80px;gap:0;background:var(--navy);color:#fff;font-size:.78rem;font-weight:700;padding:.55rem 1rem;border-radius:12px 12px 0 0;position:sticky;top:0;z-index:1">
      <span>ลำดับ</span><span>รุ่น</span><span>ยศ ชื่อ นามสกุล</span><span style="text-align:center">ประเภท</span><span style="text-align:center">สถานะ</span>
    </div>
    <div id="member-list"></div>
  </div>

</div>

<footer>
  <p>ชุมนุมศิษย์พยาบาลทหารอากาศ (ชศพอ.) &nbsp;|&nbsp; nurse.rtafnc@gmail.com</p>
</footer>

<!-- Google Identity Services (silent sign-in) -->
<script src="https://accounts.google.com/gsi/client" async></script>
<script src="js/config.js"></script>
<script src="js/ui.js"></script>
<script src="js/api.js"></script>
<script>
// ── Render rows ────────────────────────────────────────
function renderRows(members, total) {
  const loading = document.getElementById('member-loading');
  const empty   = document.getElementById('member-empty');
  const scroll  = document.getElementById('member-scroll');
  const list    = document.getElementById('member-list');

  loading.style.display = 'none';

  if (!members || members.length === 0) {
    empty.style.display = '';
    scroll.style.display = 'none';
    return;
  }
  empty.style.display = 'none';

  list.innerHTML = members.map((m, i) => {
    const no      = escHtml(String(m.row_num || (i+1)));
    const name    = escHtml([m.rank, m.fname, m.lname].filter(Boolean).join(' '));
    const gen     = escHtml(String(m.gen || '-'));
    const type    = escHtml(m.type || '-');
    const statCls = m.status === 'มีชีวิต' ? 'badge-green' : 'badge-red';
    const stat    = `<span class="badge ${statCls}" style="font-size:.72rem">${escHtml(m.status || '-')}</span>`;
    const bg      = i % 2 === 0 ? '#fff' : '#f8f9fc';
    return `<div style="display:grid;grid-template-columns:48px 56px 1fr 80px 80px;gap:0;padding:.5rem 1rem;border-bottom:1px solid #f0f0f5;font-size:.88rem;align-items:center;background:${bg}">
      <span style="color:var(--text-muted);font-size:.8rem">${no}</span>
      <span style="color:var(--gold);font-weight:600;font-size:.82rem">${gen}</span>
      <span style="color:var(--navy);font-weight:600">${name}</span>
      <span style="text-align:center;color:#475569;font-size:.82rem">${type}</span>
      <span style="text-align:center">${stat}</span>
    </div>`;
  }).join('');

  scroll.style.display = '';
}

// ── Search ─────────────────────────────────────────────
async function doSearch() {
  const query = document.getElementById('s-name').value.trim();
  const gen   = document.getElementById('s-gen').value;
  const type  = document.getElementById('s-type').value;

  document.getElementById('member-loading').style.display = '';
  document.getElementById('member-scroll').style.display = 'none';
  document.getElementById('member-empty').style.display  = 'none';

  try {
    const data = await API.searchMembers(query, gen, type, 1, 9999);
    const total = data.total || 0;
    document.getElementById('result-count').textContent = `พบ ${total.toLocaleString()} รายการ`;
    renderRows(data.members, total);
  } catch(e) {
    document.getElementById('member-loading').style.display = 'none';
    document.getElementById('member-empty').style.display  = '';
    document.getElementById('member-empty').textContent    = '⚠️ ยังไม่ได้เชื่อมต่อ API';
  }
}

// ── Load dropdowns from actual data ───────────────────
async function loadFilterOptions() {
  try {
    const data = await API.getFilterOptions();
    const genSel  = document.getElementById('s-gen');
    const typeSel = document.getElementById('s-type');

    (data.generations || []).forEach(g => {
      genSel.innerHTML += `<option value="${escHtml(g)}">${escHtml(g)}</option>`;
    });

    typeSel.innerHTML = '<option value="">ทุกประเภท</option>';
    (data.types || []).forEach(t => {
      typeSel.innerHTML += `<option value="${escHtml(t)}">${escHtml(t)}</option>`;
    });
  } catch(e) {}
}

// Search while typing (debounced 400ms)
let _searchTimer = null;
document.getElementById('s-name').addEventListener('input', () => {
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(doSearch, 400);
});

document.getElementById('s-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') { clearTimeout(_searchTimer); doSearch(); }
});

// ── Init ───────────────────────────────────────────────
loadFilterOptions();
doSearch();
</script>
</body>
</html>
